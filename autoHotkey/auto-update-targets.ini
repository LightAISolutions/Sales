; ════════════════════════════════════════════════════════════════════════════
; AutoUpdate Manifest — auto-update-targets.ini
;
; Repo-tracked list of every script currently being auto-updated by
; autoHotkey/AutoUpdate.ahk. One [target:<Name>] section per script.
;
; Per-machine local paths are NOT stored here — at runtime AutoUpdate joins
; each manifest entry with a matching [intent:<Name>] section in the
; developer's local AutoUpdate.manual-targets.ini (gitignored) to compute
; the local target path. A manifest entry whose intent has no Local Folder
; on this machine renders in the GUI as "⚠ no local folder configured" and
; is skipped during polls.
;
; AutoUpdate.ahk itself is NOT listed here — the self-target is hardcoded
; in InitTargets() so the script can bootstrap without depending on a file
; it polls.
;
; Format per entry:
;   [target:<Name>]
;   filename=<Name>.ahk
;   remotePath=autoHotkey/<Name>.ahk
;   versionFile=ahk-versions/<lower-name>ahk.version.txt
;   reloadSignal=true
;   enabled=true
;
; ════════════════════════════════════════════════════════════════════════════
; Developed by: ShadowAISolutions

[target:Test1.ahk]
filename=Test1.ahk.ahk
remotePath=autoHotkey/Test1.ahk.ahk
versionFile=ahk-versions/test1ahkahk.version.txt
reloadSignal=true
enabled=true

